<!-- Forgot Password Modal -->
<div id="forgot-pwd-modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Reset Password</h3>
    <p>Enter your email address to receive a password reset link.</p>
    <input type="email" id="reset-email" placeholder="Email" required />
    <button id="send-reset-link" style="background-color:#007bff; color:white; padding:10px; width:100%; border:none; border-radius:5px;">Send Reset Link</button>
    <div id="reset-alert" class="alert"></div>
  </div>
</div>

<script>
  const url = "https://home-rental-b3lp.onrender.com/client_data";
  const loginBtn = document.getElementById("login");
  const forgotPwdLink = document.getElementById("forgot-pwd-link");
  const forgotPwdModal = document.getElementById("forgot-pwd-modal");
  const closeModal = document.querySelector(".close");
  const sendResetLink = document.getElementById("send-reset-link");

  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
  }

  loginBtn.onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const alertBox = document.getElementById("alert");

    if (!email || !password) {
      alertBox.textContent = "Please enter email and password.";
      return;
    }

    try {
      const res = await fetch(url);
      const data = await res.json();
      const user = data.find(u => u.user_id === email && u.password === password);

      if (user) {
        setCookie("isLoggedIn", "true", 1);
        setCookie("userEmail", email, 1);
        setCookie("userId", user.id, 1);
        window.location.href = "index.html"
      } else {
        alertBox.textContent = "Invalid email or password.";
      }
    } catch (err) {
      alertBox.textContent = "Server error. Try again.";
    }
  };

  forgotPwdLink.onclick = () => {
    forgotPwdModal.style.display = "block";
  };

  closeModal.onclick = () => {
    forgotPwdModal.style.display = "none";
  };

  sendResetLink.onclick = () => {
    const resetEmail = document.getElementById("reset-email").value.trim();
    const resetAlert = document.getElementById("reset-alert");
    if (resetEmail) {
      resetAlert.style.color = "green";
      resetAlert.textContent = "Reset link sent (demo only).";
    } else {
      resetAlert.style.color = "red";
      resetAlert.textContent = "Please enter your email.";
    }
  };

  // Google Sign-In Handler
  window.handleGoogleSignIn = async function(response) {
    const base64Url = response.credential.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));

    const { email, name, picture } = JSON.parse(jsonPayload);
    try {
      const res = await fetch(url);
      const users = await res.json();
      let user = users.find(u => u.user_id === email);

      if (!user) {
        // Register user if not found
        await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: email,
            password: "",
            name,
            profile: picture
          })
        });
      }

      setCookie("isLoggedIn", "true", 1);
      setCookie("userEmail", email, 1);
      window.location.href = "index.html";
    } catch (err) {
      alert("Google Sign-In failed.");
    }
  };

  window.onload = () => {
    google.accounts.id.initialize({
      client_id: "293488991693-reik0rgpg0ap3u7ra4mliplgtkdd2qmg.apps.googleusercontent.com",
      callback: handleGoogleSignIn
    });
    
    // Render button with mobile support
    google.accounts.id.renderButton(
      document.getElementById("google-signin-container"),
      { 
        type: "standard",
        theme: "outline", 
        size: "large",
        width: "300",
        text: "signin_with"
      }
    );
  };
</script>

<script>
  const hamburger = document.getElementById('hamburger');
  const sideNav = document.getElementById('sideNav');
  const sideNavOverlay = document.getElementById('sideNavOverlay');

  // Function to open side navigation
  function openSideNav() {
    sideNav.classList.add('open');
    sideNavOverlay.classList.add('active');
    hamburger.classList.add('active');
  }

  // Function to close side navigation
  function closeSideNav() {
    sideNav.classList.remove('open');
    sideNavOverlay.classList.remove('active');
    hamburger.classList.remove('active');
  }

  // Hamburger menu functionality
  hamburger.addEventListener('click', function (e) {
    e.stopPropagation(); // Prevent click from bubbling up
    if (sideNav.classList.contains('open')) {
      closeSideNav();
    } else {
      openSideNav();
    }
  });

  // Close side nav when clicking on overlay
  sideNavOverlay.addEventListener('click', function() {
    closeSideNav();
  });

  // Close side nav when clicking anywhere on the document
  document.addEventListener('click', function(e) {
    // Check if side nav is open and click is not inside side nav
    if (sideNav.classList.contains('open') && !sideNav.contains(e.target)) {
      closeSideNav();
    }
  });

  // Close side nav when clicking on side nav links (for mobile UX)
  sideNav.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') {
      closeSideNav();
    }
  });

  // Close with Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && sideNav.classList.contains('open')) {
      closeSideNav();
    }
  });

  // Handle touch events for mobile
  let touchStartX = 0;
  let touchStartY = 0;

  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  });

  document.addEventListener('touchend', function(e) {
    if (sideNav.classList.contains('open')) {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const deltaX = touchStartX - touchEndX;
      const deltaY = Math.abs(touchStartY - touchEndY);
      
      // If swipe left with more horizontal than vertical movement
      if (deltaX > 50 && deltaY < 100) {
        closeSideNav();
      }
    }
  });

  // Navigation color change on scroll
  function updateNavColors() {
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const documentHeight = document.documentElement.scrollHeight - window.innerHeight;
    const halfPage = documentHeight / 2;
    
    const navLinks = document.querySelectorAll('.nav-links a');
    const logoText = document.querySelector('.logo span');
    
    if (scrollTop >= halfPage) {
      // After half page - change to blue
      navLinks.forEach(link => {
        link.style.color = 'rgb(20, 15, 92)';
      });
      if (logoText) {
        logoText.style.color = 'rgb(20, 15, 92)';
      }
    } else {
      // Before half page - keep white
      navLinks.forEach(link => {
        link.style.color = 'white';
      });
      if (logoText) {
        logoText.style.color = 'white';
      }
    }
  }

  function throttle(func, limit) {
    let inThrottle;
    return function() {
      const args = arguments;
      const context = this;
      if (!inThrottle) {
        func.apply(context, args);
        inThrottle = true;
        setTimeout(() => inThrottle = false, limit);
      }
    };
  }

  // Event listener for scroll
  window.addEventListener('scroll', throttle(updateNavColors, 16));

  // Initialize on page load
  updateNavColors();
</script>
