 <style>
   * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      overflow-x: hidden;
      overscroll-behavior: none;
      overflow-y: auto;
      /* background: url('https://images.unsplash.com/photo-1570129477492-45c003edd2be?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
      background-attachment: fixed; */

    }

    .fancy-input {
  padding: 14px 12px;
  font-size: 16px;
  border: 2px solid gray;
  border-radius: 5px;
  transition: border-color 0.3s, color 0.3s;
  outline:none;
}

.fancy-input:focus {
  border-color: blue;
  outline: none;
}

/* Placeholder animation (faux float effect) */
.fancy-input::placeholder {
  color: gray;
  transition: all 0.3s ease;
  transform: translateY(0px);
}


.fancy-input:focus::placeholder {
  transform: translateY(-20px);
  font-size: 12px;
  color: blue;
  font-size: 14px;
}
    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: transform 0.3s ease;
    }


    .logo img {
      width: 40px;
      height: 40px;
      margin-right: 0.5rem;
      border-radius: 8px;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

  

    .nav-links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

   .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background:rgb(1, 109, 1);
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background: white;
      transition: all 0.3s ease;
    }

    .hamburger.active div:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger.active div:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active div:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    .side-nav {
      position: fixed;
      top: 0;
      left: -100%;
      height: 100%;
      width: 200px;
      background: transparent;
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 70px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-left: 20px;
      transition: left 0.3s ease;
      z-index: 999;
    }

    .side-nav a {
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      transition: color 0.3s;
      padding:7px
    }

    .side-nav a:hover {
      color: #38bdf8;
    }

    .side-nav.open {
      left: 0;
    }

    /* Overlay for closing side nav */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

  /* Signup form container styling */
       /* Main Content */
    .main-content {
      position: relative;
      z-index: 100;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background-attachment: fixed;
    }

    .main-content::before {

    .container {

    .container h2 {

     input {

       input:focus {

    }


    button {

     /* Alert styles */
    .alert {
      display: none;
      padding: 1rem;
      border-radius: 10px;
      margin-top: 1rem;

      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .alert.error {
      background: rgba(244, 32, 32, 0.83);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .alert:not(.error) {

      border: 1px solid rgba(34, 197, 94, 0.3);
    }

     #close-btn{

    }

  

    @keyframes fadeIn {

<!-- Signup Form -->
<div class="main-content">
  <div class="container">
    <button id="close-btn" title="Close">×</button>
    <h2 style="color:white;">Sign Up</h2>

    <form id="signup-form">
      <input type="text" id="user-name" placeholder="User Name" autofocus/>
      <input type="email" id="signup-email" placeholder="Email" />
      <input type="password" id="signup-password" placeholder="Password" />
      <button type="submit" id="signup-btn">Sign Up</button>
    </form>
    <p style="color:white">Already have an account? <a href="client_login.html">Login</a></p>
    <div id="alert" class="alert"></div>
  </div>
</div>

<script>
// Server URL
const url = "https://home-rental-b3lp.onrender.com/client_data";

// DOM elements
const signupForm = document.getElementById("signup-form");
const signupBtn = document.getElementById("signup-btn");
const alertBox = document.getElementById("alert");
const userName = document.getElementById("user-name");
const signupEmail = document.getElementById("signup-email");
const signupPassword = document.getElementById("signup-password");

// Function to show alert messages
function showAlert(message, type = "success") {
  alertBox.textContent = message;
  alertBox.className = type === "error" ? "alert error" : "alert";
  alertBox.style.display = "block";
  
  // Hide alert after 3 seconds
  setTimeout(() => {
    alertBox.style.display = "none";
  }, 2000);
}

// Function to handle form submission
async function handleSignup(event) {
  // Prevent default form submission
  if (event) event.preventDefault();
  
  // Get form values and trim whitespace
  const name = userName.value.trim();
  const email = signupEmail.value.trim();
  const password = signupPassword.value.trim();
  
  // Validate form fields
  if (!name || !email || !password) {
    showAlert("Please fill all the fields", "error");
    return;
  }
  
  // Disable button and show loading state
  signupBtn.disabled = true;
  signupBtn.textContent = "Signing up...";
  
  // Create user object
  const userData = {
    id: email,
    user_id: email,
    user_name: name,
    password: password
  };
  
  try {
    console.log("Sending signup request to server...");
    
    // Send POST request to server
    const response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(userData)
    });
    
    // Check if request was successful
    if (!response.ok) {
      throw new Error(`Server returned ${response.status}: ${response.statusText}`);
    }
    
    // Try to parse response as JSON (optional)
    const data = await response.json().catch(() => ({}));
    console.log("Signup successful:", data);
    
    // Show success message
    showAlert("Signup successful! Redirecting to login page...");
    
    // Store signup email in localStorage (helpful for auto-filling login form)
    localStorage.setItem("registeredEmail", email);
    
    // Redirect to login page (using multiple methods for reliability)
    console.log("Redirecting to login page...");
    
    // Method 1: Direct navigation
    window.location.href = "client_login.html";
    
    // Method 2: Fallback redirect after a short delay
    setTimeout(() => {
      window.location.replace("client_login.html");
    }, 2000);
    
  } catch (error) {
    // Log and show error
    console.error("Signup error:", error);
    showAlert(`Signup failed: ${error.message}`, "error");
    
    // Reset button state
    signupBtn.disabled = false;
    signupBtn.textContent = "Sign Up";
  }
}

// Event Listeners
signupForm.addEventListener("submit", handleSignup);

// Additional event listener for manually clicking the button (backup)
signupBtn.addEventListener("click", function(e) {
  // Only trigger if not part of a form submission
  if (e.target.form && !e.target.form.reportValidity()) {
    e.preventDefault();
    handleSignup();
  }
});

// Log that script loaded successfully
console.log("Signup page script loaded and ready");
</script>

<script>
  const hamburger = document.getElementById('hamburger');
  const sideNav = document.getElementById('sideNav');
  const overlay = document.getElementById('overlay');
  const closeBtn = document.getElementById('close-btn');

  // Toggle side navigation
  hamburger.addEventListener('click', function () {
    sideNav.classList.toggle('open');
    overlay.classList.toggle('active');
    this.classList.toggle('active');
  });

  // Close side nav when clicking on overlay
  overlay.addEventListener('click', function() {
    sideNav.classList.remove('open');
    overlay.classList.remove('active');
    hamburger.classList.remove('active');
  });

  // Close side nav when clicking any link inside it
  const sideNavLinks = sideNav.querySelectorAll('a');
  sideNavLinks.forEach(link => {
    link.addEventListener('click', function() {
      sideNav.classList.remove('open');
      overlay.classList.remove('active');
      hamburger.classList.remove('active');
    });
  });

  // Close button functionality
  closeBtn.addEventListener('click', function(){
    window.close();
  });
</script>
</body>
